<html>

  <body>
    <h1>Test</h1>
    <h1 id="a"></h1>
    <script>
      async function getPage(url) {
        let x=await fetch(url, {mode: "no-cors"});
        if (x.ok) {
          let y=await x.text();
          console.log(y);
        }
        else {
          console.log(x.status)
        }
      }
      getPage("https://wikipedia.org");
    </script>
