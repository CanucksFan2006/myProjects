<!DOCTYPE html>
<html>
    <head>
        <title>Higher Or Lower</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="smile.png" type="image/png">
    </head>
    <body>
        <h1>Higher Or Lower</h1>
        <button id="startButton">Start</button>
        <div id="number"></div>
        <button id="higherButton">Higher</button>
        <button id="lowerButton">Lower</button>
        <h3 id="streakText"></h3>
        <script>
            function start()
            {
                higherButton.style.display = "";
                lowerButton.style.display = "";
                button.style.display = "none";
                n = Math.floor(Math.random() * 100) + 1;
                numberDiv.innerHTML = "<h2>Will the next number be higher or lower than " + n.toString() + "?</h2>";
            }
            function higher()
            {
                newN = n;
                while (newN == n)
                {
                    newN = Math.floor(Math.random() * 100) + 1;
                }
                if (newN > n)
                {
                    streak += 1;
                }
                else
                {
                    window.alert("Wrong")
                    reset()
                }
            }
            function lower()
            {
                newN = n;
                while (newN == n)
                {
                    newN = Math.floor(Math.random() * 100) + 1;
                }
                if (newN < n)
                {
                    streak += 1;
                }
                else
                {
                    window.alert("Wrong")
                    reset()
                }
            }
            let streak = 0;
            const button = document.getElementById("startButton");
            const numberDiv = document.getElementById("number");
            const higherButton = document.getElementById("higherButton")
            const lowerButton = document.getElementById("lowerButton")
            higherButton.style.display = "none";
            lowerButton.style.display = "none";
            button.addEventListener("click", start);
            higherButton.addEventListener("click", higher);
            lowerButton.addEventListener("click", lower);
        </script>
    </body>
</html>
