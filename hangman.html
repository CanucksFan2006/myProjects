      function guessLetter(k)
      {
        if (k.key == "Enter")
        {
          let value = input.value;
          if (value.toLowerCase() == word.toLowerCase())
          {
            window.alert("You Guessed the Word With " + totalGuesses + " Guessed Letters!");
            button.style.display = "";
            input.style.display = "none";
            wordLocation.innerHTML = "";
            return;
          }
          value = value[0];
          if (word.toLowerCase().includes(value.toLowerCase()))
          {
            wordLocation.innerHTML = "";
            for (let i = 0; i < word.length; i++)
            {
              if (word[i] != " " && word.toLowerCase()[i] != value.toLowerCase() && !foundLetters.includes(word.toLowerCase()[i]))
              {
                wordLocation.innerHTML += "_&nbsp;";
              }
              else if (word[i] == " ")
              {
                wordLocation.innerHTML += "&nbsp;&nbsp;";
              }
              else if (word.toLowerCase()[i] == value.toLowerCase())
              {
                wordLocation.innerHTML += "<b>" + word[i] + "</b>" + "&nbsp;";
                foundLetters.push(value.toLowerCase())
              }
              else if (foundLetters.includes(word.toLowerCase()[i]))
              {
                wordLocation.innerHTML += "<b>" + word[i] + "</b>" + "&nbsp;";
              }
            }
          }
          else
          {
            guessesRemaining -= 1;
            remainingGuesses.innerHTML = "<h1>Guesses Remaining: " + guessesRemaining + "</h1>";
            if (guessesRemaining == 0)
            {
              window.alert("You Lost! The Word was " + word + "!");
              button.style.display = "";
              input.style.display = "none";
              remainingGuesses.style.display = "none";
              wordLocation.innerHTML = "";
              return;
            }
            else
            {
              window.alert("The Word Does Not Have the Letter " + value + "! You Have " + guessesRemaining + " Guesses Remaining!")
            }
          }
          totalGuesses += 1;
        }
      }
      let button = document.getElementById("startButton")
      button.addEventListener("click", start);
      let input = document.getElementById("inputBox");
      input.addEventListener("keydown", guessLetter);
      input.style.display = "none";
      let foundLetters = [];
      let remainingGuesses = document.getElementById("remainingGuesses")
      remainingGuesses.style.display = "none";
