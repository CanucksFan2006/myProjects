<!DOCTYPE HTML>
<html>
  <head>
    <title>Hangman</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Hangman</h1>
    <div id="word"></div>
    <script>
      let myList = ["A", "B", "C"];
      let word = Math.floor(Math.random() * myList.length);
      console.log(word);
      let wordLocation = document.getElementById("word")
      for (let i = 0; i < word.length; i++)
    {
      wordLocation.innerText += "_"
    }
    </script>
  </body>
</html>
