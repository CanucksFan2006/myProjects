<!DOCTYPE HTML>
<html>
  <head>
    <title>Hangman</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Hangman</h1>
    <button id="startButton">Start Game</button>
    <input type="text" placeholder="Enter a Letter" id="inputBox">
    <div id="word"></div>
    <script>
      function start()
      {
        button.style.display = "none";
        input.style.display = "";
        let myList = ["This One Here", "Lets Go", "We Are Among Us"];
        let word = myList[Math.floor(Math.random() * myList.length)];
        console.log(word);
        let wordLocation = document.getElementById("word")
        for (let i = 0; i < word.length; i++)
        {
          if (word[i] != " ")
          {
            wordLocation.innerHTML += "_&nbsp;";
          }
          else 
          {
            wordLocation.innerHTML += "&nbsp;&nbsp;";
          }
        }
      }
      function guessLetter(k)

      }
      }
      let button = document.getElementById("startButton")
      button.addEventListener("click", start);
      let input = document.getElementById("inputBox");
      input.addEventListener("keydown", guessLetter);
      input.style.display = "none";
    </script>
  </body>
</html>
