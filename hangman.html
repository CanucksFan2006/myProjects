<!DOCTYPE HTML>
<html>
  <head>
    <title>Hangman</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Hangman</h1>
    <div id="word"></div>
    <script>
      let myList = ["This One Here", "Lets Go", "We Are Among Us"];
      let word = myList[Math.floor(Math.random() * myList.length)];
      console.log(word);
      let wordLocation = document.getElementById("word")
      for (let i = 0; i < word.length; i++)
      {
        if (word[i] != " ")
        {
          wordLocation.innerText += "_";
        }
        else 
        {
          wordLocation.innerText += " ";
        }
      }
    </script>
  </body>
</html>
