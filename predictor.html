<!DOCTYPE html>
<html>
    <head>
        <title>Concert Setlist Predictor</title>
        <link rel="stylesheet"
              href="style.css">
        <link rel="icon"
              href="smile.png"
              type="image/png">
        <style>
            label {
                display: block;
                font-size: 2em;
                font-weight: bold;
            }

            ol {
                list-style-position: inside;
                font-size: 1.5em;
                font-weight: bold;
                padding-left: 0;
                margin: 0
            }
        </style>
    </head>
    <body>
        <label for="upload">Click Here to Upload Your Predictions</label>
        <input type="file"
               id="upload"
               onchange="uploaded(event)"
               style="display:none"
               accept="text/plain">
        <h2>Predicted Setlist</h2>
        <ol>
            <div id="predictedSongs"></div>
        </ol>
        <h2>Actual Setlist</h2>
        <ol>
            <div id="actualSongs"></div>
        </ol>
        <br>
        <input type="text" id="typed" onkeypress="press(event, this.value)">
        <h1><a href="index.html">Back</a></h1>
        <script>
            let lastWasIncorrect = false; // State tracker

            function press(e, value) {
                if (e.key !== "Enter" || value === "") return;
                
                let arr = predictionDiv.innerText.split("\n").map(s => s.trim());
                let lastLi = actualDiv.lastElementChild;

                // 1. REPETITION (Edit previous li, keep its original color)
                if (lastLi && lastLi.textContent.includes(value)) {
                    repetitions[value] = (repetitions[value] || 1) + 1;
                    lastLi.textContent = `${value} (${repetitions[value]}x)`;
                    return; // Exit, color stays as is
                }

                // 2. SWAP (If current matches previous expected, and previous matches current expected)
                if (lastLi && value === arr[index - 1] && lastLi.textContent === arr[index]) {
                    lastLi.style.backgroundColor = "#00aaaa"; // Blue
                    let li = document.createElement("li");
                    li.textContent = value;
                    li.style.backgroundColor = "#00aaaa"; // Blue
                    actualDiv.appendChild(li);
                    lastWasIncorrect = false; // Swaps are "correct" transitions
                    return;
                }

                // 3. CORRECT (Green or Orange)
                let li = document.createElement("li");
                li.textContent = value;

                if (value === arr[index]) {
                    li.style.backgroundColor = lastWasIncorrect ? "#aa5000" : "#00aa00";
                    index++;
                    lastWasIncorrect = false;
                } 
                // 4. INCORRECT (Red)
                else {
                    li.style.backgroundColor = "#aa0000";
                    lastWasIncorrect = true; // Trigger Orange for next time
                }

                actualDiv.appendChild(li);
            }
            function uploaded(event) {
                const file = event.target.files[0];
                let reader = new FileReader();
                reader.onload = function (e) {
                    predictions = e.target.result.split('\n').map(s => s.trim()).filter(s => s !== "");
                    predictionDiv.innerHTML = "";
                    let listHTML = "";
                    predictions.forEach(song => {
                        listHTML += `<li>${song}</li>`;
                    });
                    predictionDiv.innerHTML = listHTML;
                }
                reader.readAsText(file);
            }
            const predictionDiv = document.getElementById("predictedSongs");
            const actualDiv = document.getElementById("actualSongs");
            let shift = 0;
            let index = 0;
            let i = 0
            let potentialSwap = 0;
            let tInner = "";
            let repetitions = 2;
            let lastSongWasWrong = false;
            let lastPlayed = null;
            actualDiv.innerHTML = ""
        </script>
    </body>
</html>
