<!DOCTYPE html>
<html>
    <head>
        <title>Concert Setlist Predictor</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="smile.png" type="image/png">
    </head>
    <body>
        <label for="upload">Upload Your Predictions</label>
        <input type="file" id="upload" onchange="uploaded(e)" style="display:none" accept="text/plain">
        <ol>
            <div id="predictedSongs"></div>
        </ol>
        <h1><a href="index.html">Back</a></h1>
        <script>
            function uploaded(e) {
                const file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = function(e) {
                    predictions = e.target.result.split('\n').map(s => s.trim());
                }
                reader.readAsText(file)
                predictions.innerHTML = "A"
            }
            const predictionDiv = document.getElementById("predictedSongs")
        </script>
    </body>
</html>
