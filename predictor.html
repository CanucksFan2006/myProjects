<!DOCTYPE html>
<html>
    <head>
        <title>Concert Setlist Predictor</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="smile.png" type="image/png">
    <style>
        label {
            display: block;
            font-size: 2em;
            font-weight: bold;
        }

        ol {
            list-style-position: inside;
            font-size: 1.5em;
            font-weight: bold;
            padding-left: 0;
            margin: 0
        }
    </style>
    </head>
    <body>
        <label for="upload">Click Here to Upload Your Predictions</label>
        <input type="file" id="upload" onchange="uploaded(event)" style="display:none" accept="text/plain">
        <h2>Predicted Setlist</h2>
        <ol>
            <div id="predictedSongs"></div>
        </ol>
        <h2>Actual Setlist</h2>
        <ol>
            <div id="actualSongs"></div>
        </ol>
        <br>
        <input type="text" id="typed" onkeypress="press(event, this.value)">
        <h1><a href="index.html">Back</a></h1>
        <script>
            function press(event, value) {
                if (event.key === "Enter" && value !== "") {
                    let arr = predictionDiv.innerText.split("\n");
                    if (value === arr[index]) {
                        actualDiv.innerHTML += `<li style="background-color:#00aa00" id="song${i}">${value}</li>`;
                    } else {
                        let t = document.getElementById(`song${i - 1}`)
                        if (!t) {
                            t.innerText = "";
                        }
                        if (value === t.innerText||"") {
                            t.innerText = t.innerText + "a";
                        } else if (value === arr[index - shift]) {
                            actualDiv.innerHTML += `<li style="background-color:#aa5000" id="song${i}">${value}</li>`;
                            index = index - shift
                            shift = 0;
                        } else {
                            actualDiv.innerHTML += `<li style="background-color:#aa0000" id="song${i}">${value}</li>`
                            if (value !== arr[index + 1]) {
                                shift = shift + 1;
                            } else {
                                shift = 0;
                            }
                        }
                    }

                    if (potentialSwap === 1) {
                        if (value === arr[index - 1]) {
                            let target1 = document.getElementById(`song${i - 1}`);
                            let target2 = document.getElementById(`song${i}`);
                            target1.style.backgroundColor = "#00aaaa";
                            target2.style.backgroundColor = "#00aaaa";
                        }
                        potentialSwap = 0;
                        shift = 0;
                    }
                    
                    if (value === arr[index + 1]) {
                        potentialSwap = 1;
                    }
                    index = index + 1;
                    i = i + 1
                }
            }

            function uploaded(event) {
                const file = event.target.files[0];
                let reader = new FileReader();
                reader.onload = function(e) {
                    predictions = e.target.result.split('\n').map(s => s.trim()).filter(s => s !== "");
                    predictionDiv.innerHTML = "";
                    let listHTML = "";
                    predictions.forEach(song => {
                        listHTML += `<li>${song}</li>`;
                    });
                    predictionDiv.innerHTML = listHTML;
                }
                reader.readAsText(file);
            }
            const predictionDiv = document.getElementById("predictedSongs");
            const actualDiv = document.getElementById("actualSongs");
            let shift = 0;
            let index = 0;
            let i = 0
            let potentialSwap = 0;
            actualDiv.innerHTML = ""
        </script>
    </body>
</html>
