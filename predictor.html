<!DOCTYPE html>
<html>
    <head>
        <title>Concert Setlist Predictor</title>
        <link rel="stylesheet"
              href="style.css">
        <link rel="icon"
              href="smile.png"
              type="image/png">
        <style>
            label {
                display: block;
                font-size: 2em;
                font-weight: bold;
            }

            ol {
                list-style-position: inside;
                font-size: 1.5em;
                font-weight: bold;
                padding-left: 0;
                margin: 0
            }
        </style>
    </head>
    <body>
        <label for="upload">Click Here to Upload Your Predictions</label>
        <input type="file"
               id="upload"
               onchange="uploaded(event)"
               style="display:none"
               accept="text/plain">
        <h2>Predicted Setlist</h2>
        <ol>
            <div id="predictedSongs"></div>
        </ol>
        <h2>Actual Setlist</h2>
        <ol>
            <div id="actualSongs"></div>
        </ol>
        <br>
        <input type="text" id="typed" onkeypress="press(event, this.value)">
        <h1><a href="index.html">Back</a></h1>
        <script>
            function press(e, value) {
                if (e.key !== "Enter" || value === "") return;

                let items = Array.from(actualDiv.querySelectorAll("li"));
                let lastLi = items.length > 0 ? items[items.length - 1] : null;

                // 1. REPEAT CHECK (Clean comparison)
                let lastClean = lastLi ? lastLi.textContent.replace(/\s*\(\d+x\)$/, '') : "";

                if (lastLi && value === lastClean) {
                    repetitions[value] = (repetitions[value] || 1) + 1;
                    lastLi.textContent = `${value} (${repetitions[value]}x)`;
                } else {
                    // 2. NEW SONG
                    let li = document.createElement("li");
                    li.textContent = value;
                    actualDiv.appendChild(li);
                }

                // 3. RE-EVALUATE EVERYTHING
                checkColors();
            }

            function checkColors() {
                let arr = predictionDiv.innerText.split("\n").map(s => s.trim());
                let items = Array.from(actualDiv.querySelectorAll("li"));
                
                // We need to know if the PREVIOUS item was RED to trigger ORANGE
                let wasLastRed = false;
                let predIdx = 0;

                for (let i = 0; i < items.length; i++) {
                    let val = items[i].textContent.replace(/\s*\(\d+x\)$/, '');

                    // SWAP CHECK
                    if (i < items.length - 1) {
                        let nextVal = items[i+1].textContent.replace(/\s*\(\d+x\)$/, '');
                        if (val === arr[predIdx + 1] && nextVal === arr[predIdx]) {
                            items[i].style.backgroundColor = "#00aaaa";
                            items[i+1].style.backgroundColor = "#00aaaa";
                            predIdx += 2;
                            i++; // Skip next loop
                            wasLastRed = false;
                            continue;
                        }
                    }

                    // CORRECT
                    if (val === arr[predIdx]) {
                        items[i].style.backgroundColor = wasLastRed ? "#aa5000" : "#00aa00";
                        predIdx++;
                        wasLastRed = false;
                    } 
                    // INCORRECT
                    else {
                        items[i].style.backgroundColor = "#aa0000";
                        wasLastRed = true;
                    }
                }
            }
            function uploaded(event) {
                const file = event.target.files[0];
                let reader = new FileReader();
                reader.onload = function (e) {
                    predictions = e.target.result.split('\n').map(s => s.trim()).filter(s => s !== "");
                    predictionDiv.innerHTML = "";
                    let listHTML = "";
                    predictions.forEach(song => {
                        listHTML += `<li>${song}</li>`;
                    });
                    predictionDiv.innerHTML = listHTML;
                }
                reader.readAsText(file);
            }
            const predictionDiv = document.getElementById("predictedSongs");
            const actualDiv = document.getElementById("actualSongs");
            let shift = 0;
            let index = 0;
            let i = 0
            let potentialSwap = 0;
            let tInner = "";
            let repetitions = [];
            let lastSongWasWrong = false;
            let lastPlayed = null;
            actualDiv.innerHTML = ""
        </script>
    </body>
</html>
