<!DOCTYPE html>
<html>
    <head>
        <title>Concert Setlist Predictor</title>
        <link rel="stylesheet"
              href="style.css">
        <link rel="icon"
              href="smile.png"
              type="image/png">
        <style>
            label {
                display: block;
                font-size: 2em;
                font-weight: bold;
            }

            ol {
                list-style-position: inside;
                font-size: 1.5em;
                font-weight: bold;
                padding-left: 0;
                margin: 0
            }
        </style>
    </head>
    <body>
        <label for="upload">Click Here to Upload Your Predictions</label>
        <input type="file"
               id="upload"
               onchange="uploaded(event)"
               style="display:none"
               accept="text/plain">
        <h2>Predicted Setlist</h2>
        <ol>
            <div id="predictedSongs"></div>
        </ol>
        <h2>Actual Setlist</h2>
        <ol>
            <div id="actualSongs"></div>
        </ol>
        <br>
        <input type="text" id="typed" onkeypress="press(event, this.value)">
        <h1><a href="index.html">Back</a></h1>
        <script>
            function press(e, value) {
                if (e.key !== "Enter" || value === "") return;
                
                let arr = predictionDiv.innerText.split("\n").map(s => s.trim());
                let li = document.createElement("li");
                li.textContent = value;
                li.id = "song_" + (actualDiv.children.length); // Give it an ID to find later

                // 1. REPETITION (Edit previous)
                if (lastPlayed === value) {
                    let prevLi = actualDiv.lastElementChild;
                    repetitions[value] = (repetitions[value] || 1) + 1;
                    prevLi.textContent = `${value} (${repetitions[value]}x)`;
                    prevLi.style.backgroundColor = "#ffff00";
                    return; // Stop here, don't add a new li
                }

                // 2. SWAP CHECK
                // If the last song was wrong, but THIS song is what the last one SHOULD have been
                if (lastPlayed !== null && value === arr[index - 1] && lastPlayed === arr[index]) {
                    let prevLi = actualDiv.lastElementChild;
                    // Fix the previous one
                    prevLi.style.backgroundColor = "#00aaaa";
                    prevLi.textContent = value; // Update text if needed
                    // Style current one
                    li.style.backgroundColor = "#00aaaa";
                    actualDiv.appendChild(li);
                    lastPlayed = value;
                    return;
                }

                // 3. NORMAL LOGIC
                if (value === arr[index]) {
                    li.style.backgroundColor = "#00aa00"; // Green
                    index++;
                } else if (arr.includes(value)) {
                    li.style.backgroundColor = "#aa5000"; // Orange
                    index = arr.indexOf(value) + 1;
                } else {
                    li.style.backgroundColor = "#aa0000"; // Red
                }

                actualDiv.appendChild(li);
                lastPlayed = value;
            }
            function uploaded(event) {
                const file = event.target.files[0];
                let reader = new FileReader();
                reader.onload = function (e) {
                    predictions = e.target.result.split('\n').map(s => s.trim()).filter(s => s !== "");
                    predictionDiv.innerHTML = "";
                    let listHTML = "";
                    predictions.forEach(song => {
                        listHTML += `<li>${song}</li>`;
                    });
                    predictionDiv.innerHTML = listHTML;
                }
                reader.readAsText(file);
            }
            const predictionDiv = document.getElementById("predictedSongs");
            const actualDiv = document.getElementById("actualSongs");
            let shift = 0;
            let index = 0;
            let i = 0
            let potentialSwap = 0;
            let tInner = "";
            let repetitions = 2;
            let lastSongWasWrong = false;
            let lastPlayed = null;
            actualDiv.innerHTML = ""
        </script>
    </body>
</html>
