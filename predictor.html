<!DOCTYPE html>
<html>
    <head>
        <title>Concert Setlist Predictor</title>
        <link rel="stylesheet"
              href="style.css">
        <link rel="icon"
              href="smile.png"
              type="image/png">
        <style>
            label {
                display: block;
                font-size: 2em;
                font-weight: bold;
            }

            ol {
                list-style-position: inside;
                font-size: 1.5em;
                font-weight: bold;
                padding-left: 0;
                margin: 0
            }
        </style>
    </head>
    <body>
        <label for="upload">Click Here to Upload Your Predictions</label>
        <input type="file"
               id="upload"
               onchange="uploaded(event)"
               style="display:none"
               accept="text/plain">
        <h2>Predicted Setlist</h2>
        <ol>
            <div id="predictedSongs"></div>
        </ol>
        <h2>Actual Setlist</h2>
        <ol>
            <div id="actualSongs"></div>
        </ol>
        <br>
        <input type="text" id="typed" onkeypress="press(event, this.value)">
        <h1><a href="index.html">Back</a></h1>
        <script>
            function press(e, value) {
                if (e.key !== "Enter" || value === "") return;

                let arr = predictionDiv.innerText.split("\n").map(s => s.trim());
                let items = Array.from(actualDiv.querySelectorAll("li"));
                
                // 1. REPEAT CHECK: See if the last item is already this song
                if (items.length > 0 && items[items.length - 1].textContent.substr(0, value.length) === value) {
                    let lastLi = items[items.length - 1];
                    
                    // Update the repetition counter
                    repetitions[value] = (repetitions[value] || 1) + 1;
                    lastLi.textContent = `${value} (${repetitions[value]}x)`;
                } 
                // 2. NEW SONG: Only add if not a repeat
                else {
                    let li = document.createElement("li");
                    li.textContent = value;
                    actualDiv.appendChild(li);
                }
                
                // 3. RE-EVALUATE: Now color everything including the updated item
                checkColors(arr, items);
            }

            function checkColors(arr, items) {
                
                // Reset colors
                items.forEach(li => li.style.backgroundColor = "");

                let predIdx = 0;

                for (let i = 0; i < items.length; i++) {
                    let val = items[i].textContent;

                    // REPETITION (Check if this song is the same as previous)
                    if (i > 0 && val === items[i-1].textContent.replace(/\s*\(\d+x\)$/, '')) {
                        items[i].style.backgroundColor = "#ffff00"; // Yellow
                        continue;
                    }

                    // SWAP (Look for pair mismatch)
                    if (i > 0 && val === arr[predIdx - 1] && items[i-1].textContent === arr[predIdx]) {
                        items[i-1].style.backgroundColor = "#00aaaa"; // Blue
                        items[i].style.backgroundColor = "#00aaaa";   // Blue
                        predIdx++; 
                        continue;
                    }

                    // CORRECT/WRONG
                    if (val === arr[predIdx]) {
                        // If previous item was Red (#aa0000), this one is Orange (#aa5000)
                        let prevColor = i > 0 ? items[i-1].style.backgroundColor : "";
                        items[i].style.backgroundColor = (prevColor === "rgb(170, 0, 0)") ? "#aa5000" : "#00aa00";
                        predIdx++;
                    } else {
                        items[i].style.backgroundColor = "#aa0000"; // Red
                    }
                }
            }
            function uploaded(event) {
                const file = event.target.files[0];
                let reader = new FileReader();
                reader.onload = function (e) {
                    predictions = e.target.result.split('\n').map(s => s.trim()).filter(s => s !== "");
                    predictionDiv.innerHTML = "";
                    let listHTML = "";
                    predictions.forEach(song => {
                        listHTML += `<li>${song}</li>`;
                    });
                    predictionDiv.innerHTML = listHTML;
                }
                reader.readAsText(file);
            }
            const predictionDiv = document.getElementById("predictedSongs");
            const actualDiv = document.getElementById("actualSongs");
            let shift = 0;
            let index = 0;
            let i = 0
            let potentialSwap = 0;
            let tInner = "";
            let repetitions = [];
            let lastSongWasWrong = false;
            let lastPlayed = null;
            actualDiv.innerHTML = ""
        </script>
    </body>
</html>
