<!DOCTYPE html>
<html>
    <head>
        <title>Concert Setlist Predictor</title>
        <link rel="stylesheet"
              href="style.css">
        <link rel="icon"
              href="smile.png"
              type="image/png">
        <style>
            label {
                display: block;
                font-size: 2em;
                font-weight: bold;
            }

            ol {
                list-style-position: inside;
                font-size: 1.5em;
                font-weight: bold;
                padding-left: 0;
                margin: 0
            }
        </style>
    </head>
    <body>
        <label for="upload">Click Here to Upload Your Predictions</label>
        <input type="file"
               id="upload"
               onchange="uploaded(event)"
               style="display:none"
               accept="text/plain">
        <h2>Predicted Setlist</h2>
        <ol>
            <div id="predictedSongs"></div>
        </ol>
        <h2>Actual Setlist</h2>
        <ol>
            <div id="actualSongs"></div>
        </ol>
        <br>
        <input type="text" id="typed" onkeypress="press(event, this.value)">
        <h1><a href="index.html">Back</a></h1>
        <script>
            function press(e, value) {
                if (e.key !== "Enter" || value === "") return;

                let arr = predictionDiv.innerText.split("\n").map(s => s.trim().replace(/^\d+\.\s*/, ''));
                
                // DEBUG: This will tell us if your logic is even looking at the right items
                console.log("Current Index:", index);
                console.log("Expected Now:", arr[index], "| Expected Prev:", arr[index-1]);
                console.log("Value Typed:", value, "| Last Played:", lastPlayed);

                let li = document.createElement("li");
                li.textContent = value;

                // The Logic
                if (lastPlayed === arr[index] && value === arr[index-1]) {
                    // SWAP TRIGGER
                    console.log("SWAP DETECTED");
                    actualDiv.lastElementChild.style.backgroundColor = "#00aaaa";
                    li.style.backgroundColor = "#00aaaa";
                    index++; // Advance because we cleared 2 items
                } else if (value === arr[index]) {
                    li.style.backgroundColor = "#00aa00";
                    index++;
                } else {
                    li.style.backgroundColor = "#aa0000";
                }

                actualDiv.appendChild(li);
                lastPlayed = value;
            }
            function uploaded(event) {
                const file = event.target.files[0];
                let reader = new FileReader();
                reader.onload = function (e) {
                    predictions = e.target.result.split('\n').map(s => s.trim()).filter(s => s !== "");
                    predictionDiv.innerHTML = "";
                    let listHTML = "";
                    predictions.forEach(song => {
                        listHTML += `<li>${song}</li>`;
                    });
                    predictionDiv.innerHTML = listHTML;
                }
                reader.readAsText(file);
            }
            const predictionDiv = document.getElementById("predictedSongs");
            const actualDiv = document.getElementById("actualSongs");
            let shift = 0;
            let index = 0;
            let i = 0
            let potentialSwap = 0;
            let tInner = "";
            let repetitions = 2;
            let lastSongWasWrong = false;
            let lastPlayed = null;
            actualDiv.innerHTML = ""
        </script>
    </body>
</html>
