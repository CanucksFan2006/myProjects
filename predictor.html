<!DOCTYPE html>
<html>
    <head>
        <title>Concert Setlist Predictor</title>
        <link rel="stylesheet"
              href="style.css">
        <link rel="icon"
              href="smile.png"
              type="image/png">
        <style>
            label {
                display: block;
                font-size: 2em;
                font-weight: bold;
            }

            ol {
                list-style-position: inside;
                font-size: 1.5em;
                font-weight: bold;
                padding-left: 0;
                margin: 0
            }
        </style>
    </head>
    <body>
        <label for="upload">Click Here to Upload Your Predictions</label>
        <input type="file"
               id="upload"
               onchange="uploaded(event)"
               style="display:none"
               accept="text/plain">
        <h2>Predicted Setlist</h2>
        <ol>
            <div id="predictedSongs"></div>
        </ol>
        <h2>Actual Setlist</h2>
        <ol>
            <div id="actualSongs"></div>
        </ol>
        <br>
        <input type="text" id="typed" onkeypress="press(event, this.value)">
        <h1><a href="index.html">Back</a></h1>
        <script>
            function press(e, value) {
                if (e.key === "Enter" && value !== "") {
                    let arr = predictionDiv.innerText.split("\n").map(s => s.trim());
                    let li = document.createElement("li");
                    li.textContent = value;

                    // 1. PERFECT MATCH
                    if (value === arr[index]) {
                        li.style.backgroundColor = "#00aa00"; // Green
                        index++;
                    } 
                    // 2. SWAP (Check if this is the next one, and next one is this one)
                    else if (index + 1 < arr.length && value === arr[index+1] && nextInput === arr[index]) { 
                        // Note: This requires looking one step ahead
                        li.style.backgroundColor = "#00aaaa"; // Blue
                    }
                    // 3. REPETITION (If song was just played)
                    else if (value === lastPlayed) {
                        repetitions[value] = (repetitions[value] || 1) + 1;
                        li.textContent += ` (${repetitions[value]}x)`;
                        li.style.backgroundColor = "#ffff00"; // Yellow
                    }
                    // 4. RECOVERY (If it's in the list, but not the current index)
                    else if (arr.includes(value)) {
                        li.style.backgroundColor = "#aa5000"; // Orange
                        index = arr.indexOf(value) + 1;
                    }
                    // 5. WRONG
                    else {
                        li.style.backgroundColor = "#aa0000"; // Red
                    }

                    actualDiv.appendChild(li);
                    lastPlayed = value;
                }
            }
            function uploaded(event) {
                const file = event.target.files[0];
                let reader = new FileReader();
                reader.onload = function (e) {
                    predictions = e.target.result.split('\n').map(s => s.trim()).filter(s => s !== "");
                    predictionDiv.innerHTML = "";
                    let listHTML = "";
                    predictions.forEach(song => {
                        listHTML += `<li>${song}</li>`;
                    });
                    predictionDiv.innerHTML = listHTML;
                }
                reader.readAsText(file);
            }
            const predictionDiv = document.getElementById("predictedSongs");
            const actualDiv = document.getElementById("actualSongs");
            let shift = 0;
            let index = 0;
            let i = 0
            let potentialSwap = 0;
            let tInner = "";
            let repetitions = 2;
            let lastSongWasWrong = false;
            actualDiv.innerHTML = ""
        </script>
    </body>
</html>
