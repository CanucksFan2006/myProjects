<!DOCTYPE HTML>
<html>
  <head>
    <title>Collatz Conjecture</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Enter a Number to see how Long it Takes to Reach 1!</h1>
    <label for="number">Enter a Number: </label>
    <input type="text" name="number" id="number">
    <div id="location"></div>
    <script>
      function test(key)
      {
        if (key.key == "Enter")
        { 
          for (let i = 0; i < 100; i++)
          {
            console.log(i);
          }
        }
      }
      let number = document.getElementById("number");
      number.addEventListener('keydown', test);
    </script>
  </body>
</html>
