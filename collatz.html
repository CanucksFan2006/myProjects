<!DOCTYPE HTML>
<html>
  <head>
    <title>Collatz Conjecture</title>
    <link rel="stylesheet" href="style.css">
    <style>
      li {
        color: #000000;
      }
      
      li::marker {
        color: #000000;
      }
    </style>
  </head>
  <body>
    <h1>Enter a Number to see how Long it Takes to Reach 1!</h1>
    <h3>Rules: </h3>
    <ul>
      <li><p>If the number is even, then divide it by 2</p></li>
      <li><p>If the number is odd, then multiply it by 3 and add 1</p></li>
    </ul>
    <label for="number">Enter a Number: </label>
    <input type="text" name="number" id="number">
    <div id="outputDiv"></div>
    <script>
      function test(key)
      {
        if (key.key == "Enter")
        {
          numVal = number.value.trim();
          if (!isNaN(numVal) && numVal%1 == 0 && numVal > 0)
          {
            outputDiv.innerHTML = "";
            outputDiv.innerHTML += "<h1>" + numVal + "</h1>";
            while (numVal != 1)
            {
              if (numVal%2 == 0)
              {
                numVal /= 2;
                outputDiv.innerHTML += "<h1>" + numVal + "</h1>";
              }
              else
              {
                numVal = numVal * 3 + 1;
                outputDiv.innerHTML += "<h1>" + numVal + "</h1>";
              }
            } 
          }
        }
      }
      let number = document.getElementById("number");
      let outputDiv = document.getElementById("outputDiv");
      number.addEventListener('keydown', test);
    </script>
  </body>
</html>
