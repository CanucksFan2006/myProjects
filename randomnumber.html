<!DOCTYPE HTML>
<html>
  <head>
    <title>Random Number Guesser</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Enter the Minimum and Maximum Numbers Then Click the Button to Start Guessing!</h1>
    <div class="form-container">
      <label for="min">Minimum Number: </label>
      <input type="text" name="min" id="min">
      <label for="min">Maximum Number: </label>
      <input type="text" name="max" id="max">
    </div>
    <script>
      function test(key)
      {
        if (key.key === "Enter")
        {
          window.alert("A");
        }
      }
      minInput = document.getElementById("min");
      maxInput = document.getElementById("max");
      minInput.addEventListener('keydown', test);
      maxInput.addEventListener('keydown', test);
    </script>
  </body>
</html>
